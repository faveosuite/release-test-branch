name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.12.0)'
        required: true
      release_title:
        description: 'Release title'
        required: true
      release_notes:
        description: 'Release notes'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false
      draft:    
          description: 'Save as draft'                                                                                                                                             
          type: boolean                                                                                                                                                            
          default: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase development onto master
        run: |
          git checkout master
          git pull origin master
          git checkout development
          git pull origin development
          git rebase master

      - name: Merge development into master
        run: |
          git checkout master
          git merge --ff-only development
          git push origin master

      - name: Create and push tag
        run: |
          git tag -a "${{ github.event.inputs.tag_name }}" -m "${{ github.event.inputs.release_title }}"
          git push origin "${{ github.event.inputs.tag_name }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_title }}
          body: ${{ github.event.inputs.release_notes }}
          prerelease: ${{ github.event.inputs.prerelease }}
          draft: ${{ github.event.inputs.draft }}
          token: ${{ secrets.RELEASE_PAT }}
